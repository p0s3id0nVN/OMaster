          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_name || github.event.inputs.release_tag }}
          body_path: RELEASE_NOTES.md
          draft: true
          prerelease: ${{ github.event.inputs.prerelease }}
          files: ./apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Tổng kết Release
        run: |
          echo "🎉 Đã tạo bản nháp (Draft) Release thành công!"
          echo "  🏷️ Tag: ${{ github.event.inputs.release_tag }}"
          echo "  📝 Tên: ${{ github.event.inputs.release_name || github.event.inputs.release_tag }}"
          echo "  🚧 Pre-release: ${{ github.event.inputs.prerelease }}"
          echo "🔗 Xem tại: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.release_tag }}"